<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Grok2API - Imagine 瀑布流</title>
  <link rel="icon" href="/static/common/img/favicon/favicon.ico">
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://cdn.jsdelivr.net/npm/geist@1.0.0/dist/fonts/geist-sans/style.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/geist@1.0.0/dist/fonts/geist-mono/style.css" rel="stylesheet">
  <link href="/static/common/css/common.css?v=1.5.4" rel="stylesheet">
  <link href="/static/public/css/imagine.css?v=1.5.4" rel="stylesheet">
  <link href="/static/common/css/toast.css" rel="stylesheet">
  <style>
    .batch-loading-hint {
      text-align: center;
      padding: 2rem;
      color: var(--accents-5);
      font-size: 0.875rem;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.75rem;
    }

    .loading-spinner {
      width: 24px;
      height: 24px;
      border: 2px solid var(--accents-2);
      border-top-color: var(--accents-6);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .status-text.paused {
      color: #f59e0b;
    }

    .prompt-title {
      grid-column: 1 / -1;
      padding: 1.5rem 1rem;
      margin: 1rem 0;
      font-size: 1rem;
      font-weight: 600;
      color: var(--foreground);
      background: var(--accents-1);
      border-left: 4px solid var(--accents-6);
      border-radius: 4px;
      word-break: break-word;
    }

    .prompt-title:first-child {
      margin-top: 0;
    }

    @media (max-width: 768px) {
      .prompt-title {
        font-size: 0.875rem;
        padding: 1rem 0.75rem;
      }
    }

    /* 图片详情模态框样式 */
    .image-detail-modal {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 9999;
      display: none;
    }

    .modal-overlay {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.8);
      cursor: pointer;
    }

    .modal-container {
      position: relative;
      width: 90vw;
      height: 90vh;
      max-width: 1400px;
      margin: 5vh auto;
      background: #ffffff;
      border-radius: 12px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .modal-close {
      position: absolute;
      top: 1rem;
      right: 1rem;
      width: 40px;
      height: 40px;
      background: var(--accents-2);
      border: none;
      border-radius: 50%;
      font-size: 24px;
      line-height: 1;
      color: var(--foreground);
      cursor: pointer;
      z-index: 10;
      transition: all 0.2s;
    }

    .modal-close:hover {
      background: var(--accents-3);
      transform: scale(1.1);
    }

    .modal-content {
      flex: 1;
      display: flex;
      gap: 0;
      overflow: hidden;
    }

    .modal-image-section {
      flex: 0 0 60%;
      background: #f5f5f5;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      position: relative;
    }

    .carousel-container {
      position: relative;
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .carousel-image {
      max-width: 100%;
      max-height: 100%;
      object-fit: contain;
      border-radius: 8px;
      transition: opacity 0.3s ease;
    }

    .carousel-arrow {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      width: 48px;
      height: 48px;
      background: rgba(0, 0, 0, 0.4);
      border: none;
      border-radius: 50%;
      color: white;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s;
      z-index: 2;
      opacity: 0;
    }

    .carousel-container:hover .carousel-arrow {
      opacity: 1;
    }

    .carousel-arrow:hover {
      background: rgba(0, 0, 0, 0.7);
      transform: translateY(-50%) scale(1.1);
    }

    .carousel-arrow:disabled {
      opacity: 0.3;
      cursor: not-allowed;
    }

    .carousel-arrow:disabled:hover {
      background: rgba(0, 0, 0, 0.4);
      transform: translateY(-50%);
    }

    .carousel-arrow-left {
      left: 1rem;
    }

    .carousel-arrow-right {
      right: 1rem;
    }

    .carousel-indicator {
      position: absolute;
      bottom: 1rem;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(0, 0, 0, 0.6);
      color: white;
      padding: 0.5rem 1rem;
      border-radius: 20px;
      font-size: 0.875rem;
      font-weight: 500;
      z-index: 2;
    }

    .modal-info-section {
      flex: 0 0 40%;
      padding: 2rem;
      overflow-y: auto;
      background: var(--background);
    }

    .modal-info-section::-webkit-scrollbar {
      width: 8px;
    }

    .modal-info-section::-webkit-scrollbar-track {
      background: var(--accents-1);
      border-radius: 4px;
    }

    .modal-info-section::-webkit-scrollbar-thumb {
      background: var(--accents-3);
      border-radius: 4px;
    }

    .modal-info-section::-webkit-scrollbar-thumb:hover {
      background: var(--accents-4);
    }

    .modal-info-group {
      margin-bottom: 2rem;
    }

    .modal-info-title {
      font-size: 0.875rem;
      font-weight: 600;
      color: var(--accents-5);
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 0.75rem;
    }

    .modal-prompt-text,
    .modal-url-text {
      padding: 1rem;
      background: var(--accents-1);
      border-radius: 8px;
      font-size: 0.875rem;
      line-height: 1.6;
      color: var(--foreground);
      word-break: break-word;
      margin-bottom: 0.75rem;
    }

    .modal-metadata {
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
    }

    .metadata-item {
      display: flex;
      justify-content: space-between;
      padding: 0.5rem 0;
      border-bottom: 1px solid var(--accents-2);
      font-size: 0.875rem;
    }

    .metadata-label {
      color: var(--accents-5);
      font-weight: 500;
    }

    .metadata-value {
      color: var(--foreground);
      font-family: 'Geist Mono', monospace;
    }

    .modal-actions {
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
    }

    .modal-action-btn {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.75rem 1rem;
      background: var(--accents-2);
      border: 1px solid var(--accents-3);
      border-radius: 8px;
      font-size: 0.875rem;
      color: var(--foreground);
      cursor: pointer;
      transition: all 0.2s;
    }

    .modal-action-btn:hover {
      background: var(--accents-3);
      border-color: var(--accents-4);
    }

    .modal-action-btn svg {
      flex-shrink: 0;
    }

    .modal-action-primary {
      background: var(--foreground);
      color: var(--background);
      border-color: var(--foreground);
    }

    .modal-action-primary:hover {
      opacity: 0.9;
    }

    .modal-navigation {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 1rem 2rem;
      background: var(--accents-1);
      border-top: 1px solid var(--accents-2);
    }

    .modal-nav-btn {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.75rem 1.5rem;
      background: var(--accents-2);
      border: 1px solid var(--accents-3);
      border-radius: 8px;
      font-size: 0.875rem;
      color: var(--foreground);
      cursor: pointer;
      transition: all 0.2s;
    }

    .modal-nav-btn:hover:not(:disabled) {
      background: var(--accents-3);
      border-color: var(--accents-4);
    }

    .modal-nav-btn:disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }

    .modal-nav-indicator {
      font-size: 0.875rem;
      color: var(--accents-5);
      font-family: 'Geist Mono', monospace;
    }

    /* 移动端适配 */
    @media (max-width: 768px) {
      .modal-container {
        width: 100vw;
        height: 100vh;
        max-width: 100vw;
        margin: 0;
        border-radius: 0;
      }
      
      .modal-content {
        flex-direction: column;
      }
      
      .modal-image-section {
        flex: 0 0 50%;
        padding: 1rem;
      }
      
      .carousel-arrow {
        width: 40px;
        height: 40px;
        opacity: 1;
      }
      
      .carousel-arrow-left {
        left: 0.5rem;
      }
      
      .carousel-arrow-right {
        right: 0.5rem;
      }
      
      .carousel-indicator {
        bottom: 0.5rem;
        padding: 0.375rem 0.75rem;
        font-size: 0.75rem;
      }
      
      .modal-info-section {
        flex: 0 0 50%;
        padding: 1rem;
      }
      
      .modal-close {
        top: 0.5rem;
        right: 0.5rem;
        width: 36px;
        height: 36px;
        font-size: 20px;
      }
      
      .modal-navigation {
        padding: 0.75rem 1rem;
      }
      
      .modal-nav-btn {
        padding: 0.5rem 1rem;
        font-size: 0.75rem;
      }
      
      .modal-nav-btn svg {
        width: 20px;
        height: 20px;
      }
    }

    /* 扩展功能区域（P1 阶段已启用） */
    .modal-extended-features {
    }

    /* 编辑历史样式 */
    .edit-history-thumbnails {
      display: flex;
      gap: 0.5rem;
      overflow-x: auto;
      padding: 0.5rem 0;
    }
    
    .edit-history-thumbnail {
      flex-shrink: 0;
      width: 80px;
      height: 80px;
      border-radius: 8px;
      overflow: hidden;
      cursor: pointer;
      border: 2px solid transparent;
      transition: all 0.2s;
    }
    
    .edit-history-thumbnail:hover {
      border-color: var(--accents-4);
    }
    
    .edit-history-thumbnail.active {
      border-color: var(--foreground);
    }
    
    .edit-history-thumbnail img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    
    .edit-history-thumbnails::-webkit-scrollbar {
      height: 6px;
    }
    
    .edit-history-thumbnails::-webkit-scrollbar-track {
      background: var(--accents-1);
      border-radius: 3px;
    }
    
    .edit-history-thumbnails::-webkit-scrollbar-thumb {
      background: var(--accents-3);
      border-radius: 3px;
    }
  </style>
</head>

<body class="min-h-screen flex flex-col" style="background-color: var(--bg);">
  <div id="toast-container" class="toast-container"></div>
  <div id="app-header"></div>

  <main class="flex-1 container mx-auto max-w-5xl px-6 py-8 fade-in">
    <div class="space-y-6">
        <div>
          <h2 class="text-2xl font-semibold tracking-tight">Imagine 瀑布流</h2>
          <p class="text-[var(--accents-4)] mt-1 text-sm">通过 WebSocket 持续生成图片，实时展示 base64 瀑布流。</p>
        </div>

        <div class="h-px bg-[var(--border)]"></div>

      <div class="imagine-top-grid">
        <div class="imagine-card imagine-card-collapsible settings-card">
          <div class="card-content" id="settingsContent">
            <div class="card-title">生成设置</div>
            <div class="settings-grid">
              <div class="settings-block settings-block-prompt">
                <div class="settings-prompt">
                  <label class="field-label" for="promptInput">提示词</label>
                  <textarea id="promptInput" class="geist-input imagine-textarea" placeholder="描述你想要的画面，例如：未来城市霓虹雨夜，广角摄影"></textarea>
                </div>
              </div>
              <div class="settings-block settings-block-duo">
                <div class="toggle-row">
                  <div class="toggle-text">
                    <div class="toggle-title">自动跟随</div>
                    <div class="toggle-desc">滚动到最新</div>
                  </div>
                  <label class="toggle">
                    <input id="autoScrollToggle" type="checkbox">
                    <span class="toggle-track"></span>
                  </label>
                </div>
                <div class="toggle-row">
                  <div class="toggle-text">
                    <div class="toggle-title">自动保存</div>
                    <div class="toggle-desc">自动保存图片</div>
                  </div>
                  <label class="toggle">
                    <input id="autoDownloadToggle" type="checkbox">
                    <span class="toggle-track"></span>
                  </label>
                </div>
              </div>
              <div class="settings-block settings-block-row2">
                <div class="settings-row">
                  <div class="settings-field">
                    <label class="field-label" for="ratioSelect">宽高比</label>
                    <select id="ratioSelect" class="geist-input">
                      <option value="2:3" selected>2:3 竖图</option>
                      <option value="1:1">1:1 方图</option>
                      <option value="3:2">3:2 横图</option>
                      <option value="16:9">16:9 宽屏</option>
                      <option value="9:16">9:16 竖屏</option>
                    </select>
                  </div>
                  <div class="settings-field">
                    <label class="field-label" for="concurrentSelect">并发数量</label>
                    <select id="concurrentSelect" class="geist-input">
                      <option value="1" selected>1 个任务</option>
                      <option value="2">2 个任务</option>
                      <option value="3">3 个任务</option>
                    </select>
                  </div>
                </div>
              </div>
              <div class="settings-block settings-block-row2b settings-block-single">
                <div class="toggle-row toggle-row-fill">
                  <div class="toggle-text">
                    <div class="toggle-title">自动过滤</div>
                    <div class="toggle-desc">过滤不达标图片</div>
                  </div>
                  <label class="toggle">
                    <input id="autoFilterToggle" type="checkbox">
                    <span class="toggle-track"></span>
                  </label>
                </div>
              </div>
              <div class="settings-block settings-block-row3">
                <div class="settings-row">
                  <div class="settings-field">
                    <label class="field-label" for="nsfwSelect">是否 NSFW</label>
                    <select id="nsfwSelect" class="geist-input">
                      <option value="true">开启</option>
                      <option value="false">关闭</option>
                    </select>
                  </div>
                  <div class="settings-folder">
                    <label class="field-label">保存位置</label>
                    <button id="selectFolderBtn" class="geist-button-outline folder-select-btn" disabled>
                      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"></path>
                      </svg>
                      <span id="folderPath">浏览器默认位置</span>
                    </button>
                  </div>
                </div>
              </div>
              <div class="settings-block settings-block-row3b settings-block-single">
                <div class="toggle-row toggle-row-fill">
                  <div class="toggle-text">
                    <div class="toggle-title">反向新增</div>
                    <div class="toggle-desc">最新显示在上方</div>
                  </div>
                  <label class="toggle">
                    <input id="reverseInsertToggle" type="checkbox">
                    <span class="toggle-track"></span>
                  </label>
                </div>
              </div>
            </div>
          </div>
        </div>

        <div class="imagine-card imagine-card-collapsible">
          <div class="status-header-row" id="statusToggle">
            <div class="card-title">连接状态</div>
            <span id="statusText" class="status-text">未连接</span>
            <svg class="collapse-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <polyline points="6 9 12 15 18 9"></polyline>
            </svg>
          </div>
          <div class="card-content" id="statusContent">
            <div class="meta-grid">
            <div class="meta-item mode-item">
              <div class="meta-label">连接模式</div>
              <div class="mode-switch" role="group" aria-label="Connection mode">
                <button class="mode-btn" data-mode="auto" type="button">Auto</button>
                <button class="mode-btn" data-mode="ws" type="button">WS</button>
                <button class="mode-btn" data-mode="sse" type="button">SSE</button>
              </div>
            </div>
            <div class="meta-item">
              <div class="meta-label">图片数量</div>
              <div id="countValue" class="meta-value">0</div>
            </div>
            <div class="meta-item">
              <div class="meta-label">活跃任务</div>
              <div id="activeValue" class="meta-value">0</div>
            </div>
            <div class="meta-item">
              <div class="meta-label">平均耗时</div>
              <div id="latencyValue" class="meta-value">-</div>
            </div>
            </div>
          </div>
        </div>
      </div>

      <div class="imagine-card" style="overflow: hidden;">
        <div class="waterfall-header">
          <div class="card-title">瀑布流</div>
          <div class="waterfall-actions">
          </div>
        </div>
        <div id="emptyState" class="imagine-empty">
          <div class="empty-title">等待连接中</div>
          <div class="empty-subtitle">启动任务后，生成的图片会自动汇聚到这里</div>
        </div>
        <div id="waterfall" class="waterfall"></div>
        <div id="batchLoadingHint" class="batch-loading-hint" style="display: none;">
          <div class="loading-spinner"></div>
          <div>正在加载更多图片...</div>
        </div>
      </div>
  </main>

  <!-- 图片放大预览 -->
  <div id="lightbox" class="image-lightbox">
    <button class="lightbox-close" id="closeLightbox">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <line x1="18" y1="6" x2="6" y2="18"></line>
        <line x1="6" y1="6" x2="18" y2="18"></line>
      </svg>
    </button>
    <button class="lightbox-nav lightbox-prev" id="lightboxPrev">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <polyline points="15 18 9 12 15 6"></polyline>
      </svg>
    </button>
    <button class="lightbox-nav lightbox-next" id="lightboxNext">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <polyline points="9 18 15 12 9 6"></polyline>
      </svg>
    </button>
    <img id="lightboxImg" src="" alt="">
  </div>

  <div id="floatingActions" class="floating-actions">
    <button id="startBtn" class="geist-button-outline text-xs px-3 gap-1 border-0 hover:bg-gray-100">
      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <polygon points="5 3 19 12 5 21 5 3" />
      </svg>
      开始
    </button>
    <button id="stopBtn" class="geist-button-outline text-xs px-3 gap-1 border-0 hover:bg-gray-100 hidden">
      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <rect x="5" y="5" width="14" height="14" />
      </svg>
      停止
    </button>
    <span class="toolbar-sep"></span>
    <button id="clearBtn" class="geist-button-outline text-xs px-3 gap-1 border-0 hover:bg-red-100">
      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" />
      </svg>
      清空
    </button>
    <span class="toolbar-sep"></span>
    <button id="batchDownloadBtn" class="batch-download-btn geist-button-outline text-xs px-3 gap-1 border-0 hover:bg-gray-100" title="批量下载">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
        <polyline points="7 10 12 15 17 10"></polyline>
        <line x1="12" y1="15" x2="12" y2="3"></line>
      </svg>
      <span>批量</span>
    </button>
    <div id="selectionToolbar" class="selection-toolbar hidden">
      <button id="toggleSelectAllBtn" class="geist-button-outline text-xs px-3 gap-1 border-0 hover:bg-gray-100">全选</button>
      <button id="downloadSelectedBtn" class="geist-button-outline text-xs px-3 gap-1 border-0 hover:bg-gray-100">下载 <span id="selectedCount" class="selected-count">0</span></button>
    </div>
  </div>

  <!-- 图片详情模态框 -->
  <div id="imageDetailModal" class="image-detail-modal" style="display: none;">
    <div class="modal-overlay"></div>
    <div class="modal-container">
      <button class="modal-close" aria-label="关闭">×</button>
      
      <div class="modal-content">
        <!-- 左侧：图片预览区域 (60%) -->
        <div class="modal-image-section">
          <div class="carousel-container">
            <img id="modalImage" src="" alt="预览图片" class="carousel-image">
            <button class="carousel-arrow carousel-arrow-left" aria-label="上一张">
              <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <polyline points="15 18 9 12 15 6"></polyline>
              </svg>
            </button>
            <button class="carousel-arrow carousel-arrow-right" aria-label="下一张">
              <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <polyline points="9 18 15 12 9 6"></polyline>
              </svg>
            </button>
            <div class="carousel-indicator">1/1</div>
          </div>
        </div>
        
        <!-- 右侧：信息面板 (40%) -->
        <div class="modal-info-section">
          <div class="modal-info-group">
            <h3 class="modal-info-title">提示词</h3>
            <div id="modalPrompt" class="modal-prompt-text"></div>
            <button id="copyPromptBtn" class="modal-action-btn">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect>
                <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path>
              </svg>
              复制提示词
            </button>
          </div>
          
          <div class="modal-info-group">
            <h3 class="modal-info-title">Grok URL</h3>
            <div id="modalGrokUrl" class="modal-url-text"></div>
            <button id="copyGrokUrlBtn" class="modal-action-btn">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect>
                <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path>
              </svg>
              复制 URL
            </button>
          </div>
          
          <div class="modal-info-group">
            <h3 class="modal-info-title">元数据</h3>
            <div class="modal-metadata">
              <div class="metadata-item">
                <span class="metadata-label">序号:</span>
                <span id="modalSequence" class="metadata-value"></span>
              </div>
              <div class="metadata-item">
                <span class="metadata-label">耗时:</span>
                <span id="modalElapsedMs" class="metadata-value"></span>
              </div>
              <div class="metadata-item">
                <span class="metadata-label">比例:</span>
                <span id="modalAspectRatio" class="metadata-value"></span>
              </div>
              <div class="metadata-item">
                <span class="metadata-label">NSFW:</span>
                <span id="modalNsfw" class="metadata-value"></span>
              </div>
              <div class="metadata-item">
                <span class="metadata-label">Image ID:</span>
                <span id="modalImageId" class="metadata-value"></span>
              </div>
            </div>
          </div>
          
          <div id="modalEditHistory" class="modal-info-group" style="display: none;">
            <h3 class="modal-info-title">编辑历史</h3>
            <div id="editHistoryThumbnails" class="edit-history-thumbnails"></div>
          </div>
          
          <div class="modal-info-group">
            <h3 class="modal-info-title">操作</h3>
            <div class="modal-actions">
              <button id="downloadImageBtn" class="modal-action-btn modal-action-primary">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                  <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                  <polyline points="7 10 12 15 17 10"></polyline>
                  <line x1="12" y1="15" x2="12" y2="3"></line>
                </svg>
                下载图片
              </button>
            </div>
          </div>
          
          <div class="modal-info-group modal-extended-features">
            <h3 class="modal-info-title">图生图</h3>
            <div class="image-to-image-section">
              <textarea id="imageToImagePrompt" class="modal-prompt-text" rows="3" placeholder="输入新的提示词..." style="resize: vertical; margin-bottom: 0.75rem;"></textarea>
              <button id="imageToImageGenerateBtn" class="modal-action-btn modal-action-primary">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                  <rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect>
                  <circle cx="8.5" cy="8.5" r="1.5"></circle>
                  <polyline points="21 15 16 10 5 21"></polyline>
                </svg>
                生成变体
              </button>
              <div id="imageToImageLoading" class="image-to-image-loading" style="display: none; margin-top: 0.75rem; text-align: center; color: var(--accents-5); font-size: 0.875rem;">
                <div class="loading-spinner" style="margin: 0 auto 0.5rem;"></div>
                <span>生成中...</span>
              </div>
            </div>
          </div>
        </div>
      </div>
      
      <!-- 导航按钮 -->
      <div class="modal-navigation">
        <button id="modalPrevBtn" class="modal-nav-btn" aria-label="上一张">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <polyline points="15 18 9 12 15 6"></polyline>
          </svg>
          上一张
        </button>
        <span id="modalNavIndicator" class="modal-nav-indicator">1/50</span>
        <button id="modalNextBtn" class="modal-nav-btn" aria-label="下一张">
          下一张
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <polyline points="9 18 15 12 9 6"></polyline>
          </svg>
        </button>
      </div>
    </div>
